<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Divya's Studio</title>
    <meta name="description" content="Explore the professional work of Divya's Studio. Stunning transformations in hair, skin, and makeup.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quintessential&family=Montserrat:wght@300;400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .portfolio-header {
            padding: 15rem 0 8rem;
            text-align: left;
            background: var(--bg-dark);
            color: var(--white);
        }
        .portfolio-header h1 { 
            font-size: 8rem; 
            margin: 0; 
            letter-spacing: -5px;
            line-height: 0.8;
        }
        .portfolio-header h1 span {
            display: block;
            color: transparent;
            -webkit-text-stroke: 1px var(--white);
        }
        .gallery-container { padding: 8rem 0; }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }
        .portfolio-card {
            background: var(--white);
            border: 1px solid #EEE;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            cursor: pointer;
        }
        .portfolio-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }
        .portfolio-card .img-container {
            width: 100%;
            height: 300px;
            overflow: hidden;
        }
        .portfolio-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
            filter: grayscale(100%);
        }
        .portfolio-card:hover img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }
        .portfolio-details {
            padding: 1.5rem;
            text-align: center;
        }
        .portfolio-details h3 {
            font-size: 1.2rem;
            margin-bottom: 0.3rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .portfolio-details p {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Modal Gallery Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85); /* Dimmed background */
            z-index: 3000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
        }
        .modal-content {
            background: var(--white);
            width: 90%;
            max-width: 800px; /* Increased width for full images */
            max-height: 85vh;
            margin: auto; /* Ensuring auto margin for extreme centering */
            padding: 4rem 2rem;
            position: relative;
            overflow-y: auto;
            border-radius: 0;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            text-align: center; /* Center-align all text content */
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 40px;
            height: 40px;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 3010;
            transition: var(--transition);
        }
        .modal-close:hover { 
            transform: rotate(90deg); 
            background: var(--primary);
        }
        
        .modal-header { margin-bottom: 2.5rem; }
        .modal-header h2 { font-size: 1.5rem; letter-spacing: -0.5px; text-transform: uppercase; line-height: 1; margin-bottom: 0.5rem; }
        .modal-header p { text-transform: uppercase; letter-spacing: 2px; font-weight: 900; color: var(--accent); font-size: 0.6rem; }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columns for narrow modal */
            gap: 1rem;
        }
        .modal-grid img {
            width: 100%;
            height: auto;
            border: 1px solid #EEE;
            filter: grayscale(100%);
            transition: 0.5s ease;
        }
        .modal-grid img:hover { filter: grayscale(0%); }
        .expand-btn {
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 1rem 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            font-weight: 900;
            margin-top: 2rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .expand-btn:hover {
            letter-spacing: 4px;
        }
        
        @media (max-width: 1024px) {
            .gallery-grid { grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
            .portfolio-header h1 { font-size: 6rem; }
        }
        @media (max-width: 968px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
            .portfolio-header h1 { font-size: 5rem; }
            .filter-nav { flex-wrap: wrap; justify-content: center; gap: 1rem; }
        }
        @media (max-width: 576px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .portfolio-header { padding: 10rem 0 4rem; }
            .portfolio-header h1 { font-size: 3.5rem; line-height: 1; margin-bottom: 1rem; }
            .modal-content { width: 95%; padding: 2.5rem 1rem; margin: 10% auto; }
            .modal-header h2 { font-size: 1.2rem; }
            .modal-close { top: 0.8rem; right: 0.8rem; width: 30px; height: 30px; font-size: 1rem; }
        }
        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 4rem;
        }
        .filter-btn {
            background: none;
            border: none;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            cursor: pointer;
            color: #BBB;
            transition: var(--transition);
            padding-bottom: 5px;
            border-bottom: 2px solid transparent;
        }
        .filter-btn.active, .filter-btn:hover {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav-container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none;">
                    <div class="brand-text">DIVYA'S <span>STUDIO</span></div>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="jewellery.html">Jewellery</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div class="nav-right">
                <div class="hamburger" onclick="toggleMobileMenu()">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </nav>
    </header>

    <section class="portfolio-header">
        <div class="container">
            <label class="subtitle" style="color: var(--accent);">Our Work</label>
            <h1>Artistic <span>Transformations</span></h1>
            <p>A glimpse into the beauty we create every day.</p>
        </div>
    </section>

    <main class="gallery-container">
        <div class="container">
            <div class="filter-nav">
                <button class="filter-btn active" data-filter="hair">Hair</button>
                <button class="filter-btn" data-filter="skin">Skin</button>
                <button class="filter-btn" data-filter="makeup">Makeup</button>
            </div>

            <div class="gallery-grid" id="portfolioDisplay">
                <!-- Items populated by JS -->
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Divya's Studio. All rights reserved.</p>
    </footer>

    <!-- Modal Gallery Structure -->
    <div id="galleryModal" class="modal-overlay">
        <div class="modal-close" onclick="closeModal()">&times;</div>
        <div class="modal-content">
            <div class="modal-header">
                <p id="modalCategory"></p>
                <h2 id="modalTitle"></h2>
                <label id="modalSubtitle" style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; color: #999;"></label>
            </div>
            <div id="modalGalleryGrid" class="modal-grid">
                <!-- Gallery images populated by JS -->
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
    <script>
        const DEFAULT_PORTFOLIO = [
            {category: "hair", subcategory: "Styling", title: "Elegant Waves", subtitle: "Special Occasion Hairstyling", image: "assets/portfolio/hair1.png", gallery: ["assets/hair.png", "assets/makeup.png"]},
            {category: "skin", subcategory: "Facial", title: "Deep Hydration", subtitle: "Luxury Facial Results", image: "assets/portfolio/skin1.png", gallery: ["assets/skin.png", "assets/hair.png"]},
            {category: "makeup", subcategory: "Bridal", title: "Royal Bridal", subtitle: "Signature Wedding Look", image: "assets/makeup.png", gallery: ["assets/portfolio/hair1.png", "assets/portfolio/skin1.png"]},
            {category: "hair", subcategory: "Cut & Finish", title: "Precision Cut", subtitle: "Modern Style & Finish", image: "assets/hair.png", gallery: []}
        ];

        let activeFilter = 'hair';
        let latestData = [];

        function toggleCard(id) {
            const data = latestData.length ? latestData : DEFAULT_PORTFOLIO;
            const item = data.find(i => i.id == id);
            if (!item) return;

            document.getElementById('modalCategory').innerText = item.subcategory || item.category;
            document.getElementById('modalTitle').innerText = item.title;
            document.getElementById('modalSubtitle').innerText = item.subtitle;
            
            const grid = document.getElementById('modalGalleryGrid');
            grid.innerHTML = '';
            
            const allImages = item.gallery || [];
            allImages.forEach(img => {
                const imgEl = document.createElement('img');
                imgEl.src = img;
                imgEl.onerror = () => imgEl.style.display = 'none';
                grid.appendChild(imgEl);
            });

            const modal = document.getElementById('galleryModal');
            modal.style.display = 'block';
            setTimeout(() => modal.classList.add('active'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('galleryModal');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }, 400);
        }

        async function renderPortfolio() {
            let data = await getFirebaseData('portfolio');
            
            if (!data || data.length === 0) {
                if(db) {
                    for(let item of DEFAULT_PORTFOLIO) {
                       await db.collection('portfolio').add({...item, createdAt: Date.now()});
                    }
                    data = await getFirebaseData('portfolio');
                } else {
                    data = DEFAULT_PORTFOLIO;
                }
            }
            latestData = data;

            const container = document.getElementById('portfolioDisplay');
            if (!container) return;
            container.innerHTML = '';

            const filteredData = data.filter(item => {
                const isActive = item.status !== 'inactive';
                const matchesFilter = activeFilter === 'all' || item.category === activeFilter;
                return isActive && matchesFilter;
            });

            filteredData.forEach((item, index) => {
                const revealDelay = (index % 4) * 0.1;
                const card = document.createElement('div');
                card.className = 'portfolio-card reveal fade-in-up';
                card.id = `card-${item.id}`;
                card.setAttribute('data-category', item.category);
                card.style.transitionDelay = `${revealDelay}s`;
                card.onclick = () => toggleCard(item.id);

                card.innerHTML = `
                    <div class="img-container">
                        <img src="${item.image}" alt="${item.title}" onerror="this.src='assets/hair.png'">
                    </div>
                    <div class="portfolio-details">
                        <span style="font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); font-weight: 900; display: block; margin-bottom: 0.3rem;">${item.subcategory || ''}</span>
                        <h3>${item.title}</h3>
                        <p>${item.subtitle}</p>
                        <span style="font-size: 0.6rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); margin-top: 1rem; display: inline-block; border-bottom: 1px solid; opacity: 0.6;">View Gallery</span>
                    </div>
                `;
                container.appendChild(card);
            });

            if (window.revealObserver) {
                document.querySelectorAll('.reveal').forEach(el => window.revealObserver.observe(el));
            } else {
                document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelector('.filter-btn.active').classList.remove('active');
                    btn.classList.add('active');
                    activeFilter = btn.getAttribute('data-filter');
                    renderPortfolio();
                });
            });
            setTimeout(renderPortfolio, 300); // Give Firebase time to init
        });
    </script>
</body>
</html>
